name: publish

# Publishes to npm via Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Triggered on a version tag:
#   npm version patch        # bumps package.json + creates a git tag
#   git push --follow-tags   # pushes the commit and the tag → triggers this
#
# One-time setup on npmjs.com (after the first manual publish):
#   Package → Settings → Trusted Publisher → GitHub Actions
#     Organization or user: NaderNabil216
#     Repository:           skillsmith
#     Workflow filename:    publish.yml
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # OIDC needs Node >= 22.14.0
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted publishing needs npm >= 11.5.1 (Node 22 ships npm 10).
      - run: npm install -g npm@latest
      - run: node scripts/build-manifest.js
      # No token: auth is OIDC. Provenance attestations are generated automatically.
      - run: npm publish --access public
